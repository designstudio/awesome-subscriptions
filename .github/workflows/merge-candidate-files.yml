name: Merge candidate catalog files

on:
  push:
    branches:
      - catalog-v0.1-bulk
    paths:
      - .github/workflows/merge-candidate-files.yml

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: catalog-v0.1-bulk
          fetch-depth: 0

      - name: Merge and validate candidate files
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const dir = path.join('data', 'candidates');
          const read = name => JSON.parse(fs.readFileSync(path.join(dir, name), 'utf8'));

          function mergeFiles(names, expectedCount) {
            const merged = names.flatMap(read);
            const ids = new Set();
            for (const entry of merged) {
              if (!entry || typeof entry.id !== 'string' || !entry.id.trim()) {
                throw new Error(`Invalid candidate entry in ${names.join(', ')}`);
              }
              if (ids.has(entry.id)) throw new Error(`Duplicate candidate id: ${entry.id}`);
              ids.add(entry.id);
            }
            if (merged.length !== expectedCount) {
              throw new Error(`Expected ${expectedCount} entries from ${names.join(', ')}, got ${merged.length}`);
            }
            return merged;
          }

          const global = mergeFiles(['global.json', 'global-2.json', 'global-3.json'], 300);
          const brazil = mergeFiles(['BR.json', 'BR-2.json'], 200);

          fs.writeFileSync(path.join(dir, 'global.json'), JSON.stringify(global, null, 2) + '\n');
          fs.writeFileSync(path.join(dir, 'BR.json'), JSON.stringify(brazil, null, 2) + '\n');

          for (const name of ['global-2.json', 'global-3.json', 'BR-2.json']) {
            fs.rmSync(path.join(dir, name));
          }

          const readmePath = path.join(dir, 'README.md');
          let readme = fs.readFileSync(readmePath, 'utf8');
          readme = readme
            .replace(/`global\.json`, `global-2\.json`, and `global-3\.json`[^\n]*/g, '`global.json` — 300 global candidates')
            .replace(/`BR\.json` and `BR-2\.json`[^\n]*/g, '`BR.json` — 200 Brazil-focused candidates')
            .replace(/global-2\.json|global-3\.json|BR-2\.json/g, match => ({'global-2.json':'global.json','global-3.json':'global.json','BR-2.json':'BR.json'})[match]);

          if (!readme.includes('`global.json` — 300 global candidates')) {
            readme += '\n## Candidate files\n\n- `global.json` — 300 global candidates\n- `BR.json` — 200 Brazil-focused candidates\n';
          }
          fs.writeFileSync(readmePath, readme.trimEnd() + '\n');

          console.log(`Validated ${global.length} global and ${brazil.length} Brazil-focused candidates.`);
          NODE

      - name: Remove one-time workflow
        run: rm .github/workflows/merge-candidate-files.yml

      - name: Commit refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/candidates .github/workflows/merge-candidate-files.yml
          git commit -m "refactor: consolidate candidate catalog files"
          git push origin HEAD:catalog-v0.1-bulk
